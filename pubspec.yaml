name: expense_tracker
description: A beautiful personal expense tracker app with charts and analytics.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  fl_chart: ^0.70.2
  intl: ^0.20.2
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  crypto: ^3.0.7
  shared_preferences: ^2.3.4
  mailer: ^6.2.0
  go_router: ^14.8.1
  get_it: ^8.0.3
  flutter_dotenv: ^5.2.1
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^18.0.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
